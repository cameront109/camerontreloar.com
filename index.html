<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameron.</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="site">

        <!-- Logo -->
        <header class="logo">
            Cameron.
        </header>

        <!-- Top Navigation -->
        <nav class="top-nav">
            <a href="#">WORK</a>
            <a href="#">PROJECTS</a>
            <a href="#">ABOUT</a>
            <a href="#">PRINTS</a>
            <a href="#">CONTACT</a>
        </nav>

        <!-- Hero Background Panel -->
        <section class="hero"></section>

        <!-- Main Content Area -->
        <section class="content-wrapper">

            <!-- Left Navigation -->
            <aside class="side-nav">
                <a href="#">TOKYO</a>
                <a href="#">KYOTO</a>
                <a href="#">OSAKA</a>
                <a href="#">PORTRAITS</a>
                <a href="#">CONTACT</a>
            </aside>

            <!-- Main Content -->
            <main class="content">

                <div class="slideshow-container">

                    <button class="arrow left" id="prev">
                        &#10094;
                    </button>

                    <img
                        id="slideshow"
                        src="images/slide01.jpg"
                        alt="Photography Portfolio">

                    <button class="arrow right" id="next">
                        &#10095;
                    </button>

                </div>

                <section class="intro">

                    <p>
                        Documentary photography and visual storytelling
                        from Japan and beyond.
                    </p>

                </section>

                <!-- Contact Form -->

                <section class="contact-section">

                    <h2>Contact</h2>

                    <form
                        name="contact"
                        method="POST"
                        data-netlify="true">

                        <input
                            type="hidden"
                            name="form-name"
                            value="contact">

                        <div class="form-group">
                            <label for="name">Name</label>

                            <input
                                id="name"
                                type="text"
                                name="name"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>

                            <input
                                id="email"
                                type="email"
                                name="email"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>

                            <textarea
                                id="message"
                                name="message"
                                rows="6"
                                required></textarea>
                        </div>

                        <button type="submit">
                            Send
                        </button>

                    </form>

                </section>

            </main>

        </section>

    </div>

    <script>
        const slides = [
            "images/slide01.jpg",
            "images/slide02.jpg",
            "images/slide03.jpg",
            "images/slide04.jpg",
            "images/slide05.jpg"
        ];

        let currentSlide = 0;

        const image = document.getElementById("slideshow");
        const next = document.getElementById("next");
        const prev = document.getElementById("prev");

        next.addEventListener("click", () => {
            currentSlide = (currentSlide + 1) % slides.length;
            image.src = slides[currentSlide];
        });

        prev.addEventListener("click", () => {
            currentSlide =
                (currentSlide - 1 + slides.length) % slides.length;

            image.src = slides[currentSlide];
        });
    </script>

</body>
</html>
