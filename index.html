    <h2>Contact</h2>

    <form
        name="contact"
        method="POST"
        netlify>

        <input
            type="hidden"
            name="form-name"
            value="contact">

        <div class="form-group">
            <label>Name</label>
            <input
                type="text"
                name="name"
                required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                name="email"
                required>
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea
                name="message"
                rows="6"
                required></textarea>
        </div>

        <button type="submit">
            Send
        </button>

    </form>
