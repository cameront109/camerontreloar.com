<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gucci Culture Recreation</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #111;
    font-family: Arial, Helvetica, sans-serif;
    color: #fff;
}

/* Main centered site */
.site {
    width: 900px;
    margin: 80px auto;
    background: #444;
    display: flex;
    min-height: 600px;
}

/* Left sidebar */
.sidebar {
    width: 190px;
    background: #222;
    position: relative;
}

.logo {
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    letter-spacing: 8px;
    border-bottom: 1px solid #333;
}

.side-nav {
    padding: 30px;
}

.side-nav ul {
    list-style: none;
}

.side-nav li {
    margin-bottom: 18px;
}

.side-nav a {
    text-decoration: none;
    color: #999;
    font-size: 14px;
    letter-spacing: 1px;
}

.side-nav a:hover {
    color: white;
}

/* Main content area */
.content {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Top menu */
.top-nav {
    height: 60px;
    background: #2d2d2d;
    display: flex;
    align-items: center;
}

.top-nav ul {
    list-style: none;
    display: flex;
    width: 100%;
}

.top-nav li {
    padding: 0 25px;
}

.top-nav a {
    text-decoration: none;
    color: #bdbdbd;
    font-size: 13px;
    text-transform: uppercase;
}

.top-nav a:hover {
    color: white;
}

/* Main feature section */
.hero {
    flex: 1;
    display: flex;
    background: linear-gradient(
        to right,
        #666 0%,
        #666 20%,
        #111 20%,
        #111 75%,
        #000 75%
    );
}

/* Image area */
.hero-image {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.image-frame {
    width: 500px;
    height: 340px;
    background: #eee;
    overflow: hidden;
}

.image-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Right panel */
.right-panel {
    width: 180px;
    background: #000;
}

.panel-header {
    height: 120px;
    background: #888;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.panel-content {
    padding: 20px;
}
</style>
</head>
<body>

<div class="site">

    <aside class="sidebar">
        <div class="logo">GUCCI</div>

        <nav class="side-nav">
            <ul>
                <li><a href="#">GUCCI HISTORY</a></li>
                <li><a href="#">GUCCI SPACE</a></li>
                <li><a href="#">DOMENICO DE SOLE</a></li>
                <li><a href="#">TOM FORD</a></li>
            </ul>
        </nav>
    </aside>

    <main class="content">

        <nav class="top-nav">
            <ul>
                <li><a href="#">THE COLLECTION</a></li>
                <li><a href="#">GUCCI CULTURE</a></li>
                <li><a href="#">INVESTOR CENTER</a></li>
                <li><a href="#">GUCCI CONTACT</a></li>
            </ul>
        </nav>

        <section class="hero">

            <div class="hero-image">
                <div class="image-frame">
                    <img src="your-image.jpg" alt="">
                </div>
            </div>

            <aside class="right-panel">
                <div class="panel-header">
                    Cameron Treloar
                </div>

                <div class="panel-content">
                    Content here
                </div>
              <div class="hero-image">
    <img
        id="slideshow"
        src="images/slideshow1.jpg"
        alt="cameron's photos">

    <form name="contact" netlify>
  <p>
    <label>Name <input type="text" name="name" /></label>
  </p>
  <p>
    <label>Email <input type="email" name="email" /></label>
  </p>
   <p>
      <label>Message <input type="text" name="Message" /></label>
   </p>
  <p>
    <button type="submit">Send</button>
  </p>
</form>

                
</div>
            </aside>

        </section>

    </main>

</div>

</body>
</html>
